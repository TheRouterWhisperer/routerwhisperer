<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dota 2 Calibration Rank Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #1e1e1e;
    color: white;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.container {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
}

.team {
    flex: 1;
    min-width: 400px;
    background: #2a2a2a;
    padding: 15px;
    border-radius: 10px;
}

.player {
    margin-bottom: 10px;
}

select {
    width: 100%;
    padding: 8px;
    border-radius: 5px;
}

button {
    padding: 12px 20px;
    margin-top: 20px;
    margin-right: 10px;
    cursor: pointer;
}

.result {
    margin-top: 25px;
    background: #2a2a2a;
    padding: 15px;
    border-radius: 10px;
    font-size: 18px;
}
</style>
</head>
<body>

<h1>Dota 2 Calibration Rank Calculator</h1>

<label>
    Which player is uncalibrated?
    <select id="uncalibratedPlayer"></select>
</label>

<div class="container">

    <div class="team">
        <h2>Radiant</h2>
        <div id="radiant"></div>
    </div>

    <div class="team">
        <h2>Dire</h2>
        <div id="dire"></div>
    </div>

</div>

<button onclick="calculate()">Calculate</button>
<button onclick="resetForm()">Reset</button>

<div class="result" id="result">
    Select ranks and calculate.
</div>

<script>

const ranks = [
["Herald 1",77],
["Herald 2",230],
["Herald 3",384],
["Herald 4",538],
["Herald 5",692],

["Guardian 1",846],
["Guardian 2",1000],
["Guardian 3",1154],
["Guardian 4",1308],
["Guardian 5",1462],

["Crusader 1",1616],
["Crusader 2",1770],
["Crusader 3",1924],
["Crusader 4",2078],
["Crusader 5",2232],

["Archon 1",2386],
["Archon 2",2540],
["Archon 3",2694],
["Archon 4",2848],
["Archon 5",3002],

["Legend 1",3156],
["Legend 2",3310],
["Legend 3",3464],
["Legend 4",3618],
["Legend 5",3772],

["Ancient 1",3926],
["Ancient 2",4080],
["Ancient 3",4234],
["Ancient 4",4388],
["Ancient 5",4542],

["Divine 1",4720],
["Divine 2",4920],
["Divine 3",5120],
["Divine 4",5320],
["Divine 5",5520]
];

function createDropdown(id){

    const select = document.createElement("select");
    select.id = id;

    const blank = document.createElement("option");
    blank.value = "";
    blank.text = "-- Select Rank --";
    select.appendChild(blank);

    ranks.forEach(rank => {
        const option = document.createElement("option");
        option.value = rank[1];
        option.text = rank[0];
        select.appendChild(option);
    });

    return select;
}

for(let i=1;i<=5;i++){

    const div = document.createElement("div");
    div.className = "player";
    div.innerHTML = `<strong>Radiant ${i}</strong>`;
    div.appendChild(createDropdown("R"+i));
    document.getElementById("radiant").appendChild(div);
}

for(let i=1;i<=5;i++){

    const div = document.createElement("div");
    div.className = "player";
    div.innerHTML = `<strong>Dire ${i}</strong>`;
    div.appendChild(createDropdown("D"+i));
    document.getElementById("dire").appendChild(div);
}

const uncalSelect = document.getElementById("uncalibratedPlayer");

for(let i=1;i<=5;i++){
    uncalSelect.add(new Option("Radiant "+i,"R"+i));
}

for(let i=1;i<=5;i++){
    uncalSelect.add(new Option("Dire "+i,"D"+i));
}

function mmrToRank(mmr){

    for(let i=ranks.length-1;i>=0;i--){
        if(mmr >= ranks[i][1]){
            return ranks[i][0];
        }
    }

    return "Herald 1";
}

function calculate(){

    const targetPlayer = document.getElementById("uncalibratedPlayer").value;

    if(!targetPlayer){
        alert("Select the uncalibrated player.");
        return;
    }

    let radiantTotal = 0;
    let direTotal = 0;

    let radiantKnown = 0;
    let direKnown = 0;

    let radiantCount = 0;
    let direCount = 0;

    for(let i=1;i<=5;i++){

        const id = "R"+i;

        if(id === targetPlayer) continue;

        const value = Number(document.getElementById(id).value);

        if(!value){
            alert("Please fill all calibrated players.");
            return;
        }

        radiantTotal += value;
        radiantKnown++;
    }

    for(let i=1;i<=5;i++){

        const id = "D"+i;

        if(id === targetPlayer) continue;

        const value = Number(document.getElementById(id).value);

        if(!value){
            alert("Please fill all calibrated players.");
            return;
        }

        direTotal += value;
        direKnown++;
    }

    let estimatedMMR;

    if(targetPlayer.startsWith("R")){

        estimatedMMR = direTotal - radiantTotal;

    } else {

        estimatedMMR = radiantTotal - direTotal;
    }

    estimatedMMR = Math.max(0, Math.round(estimatedMMR));

    const estimatedRank = mmrToRank(estimatedMMR);

    document.getElementById("result").innerHTML = `
        <h2>Estimated Calibration</h2>
        <p><strong>Estimated MMR:</strong> ${estimatedMMR}</p>
        <p><strong>Estimated Rank:</strong> ${estimatedRank}</p>
        <p><small>Based on balancing both teams to equal total MMR.</small></p>
    `;
}

function resetForm(){

    document.querySelectorAll("select").forEach(s => {
        s.selectedIndex = 0;
    });

    document.getElementById("result").innerHTML =
        "Select ranks and calculate.";
}

</script>

</body>
</html>
